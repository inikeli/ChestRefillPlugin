name: ChestRefill
version: 1.0
main: me.nikita.chestrefill.ChestRefillPlugin
api-version: 1.21

commands:
  chestrefill:
    description: Управление регионами и перезаполнением сундуков
    usage: |
      /chestrefill set <name> <profile> <x1> <y1> <z1> <x2> <y2> <z2>
      /chestrefill refill <region>
    permission: chestrefill.admin

permissions:
  chestrefill.admin:
    description: Доступ к управлению регионами
    default: op